<article class="max-w-full">
  <section class="divider divider-info divider-end my-15 max-w-full">
    <h3 class="text-3xl">Música</h3>
  </section>

  <ul class="list bg-base-100 rounded-box shadow-md md:hidden w-full">
    @for (band of bands; track $index) {
      <li class="list-row">
        <div class="text-4xl font-thin tabular-nums text-white">{{ $index }}</div>
        <div>
          <img class="size-10 rounded-box object-cover" [src]="band.src" [alt]="band.alt" />
        </div>
        <div class="list-col-grow">
          <h4>{{ band.title }}</h4>
        </div>
        <a
          [href]="band.link"
          target="_blank"
          rel="noopener noreferrer"
          referrerpolicy="no-referrer"
          class="btn btn-ghost max-w-fit"
        >
          <svg class="size-[1.2em]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2"
              fill="none"
              stroke="currentColor"
            >
              <path d="M6 3L20 12 6 21 6 3z"></path>
            </g>
          </svg>

          <span class="text-red-500">YouTube</span>
        </a>
      </li>
    }
  </ul>

  <section
    class="hidden md:grid md:grid-cols-2 lg:grid-cols-3 justify-items-center items-center gap-20"
  >
    @for (band of bands; track band.title) {
      <section
        class="card group bg-base-100 image-full w-80 shadow-2xl transition duration-200 hover:shadow-info-content"
      >
        <figure>
          <img [src]="band.src" [alt]="band.alt" class="object-cover size-80" />
        </figure>
        <section class="card-body w-fit transition-colors duration-200 group-hover:text-secondary">
          <h2 class="card-title">{{ band.title }}</h2>
          <p>{{ band.description }}</p>
          <div class="card-actions justify-end">
            <a
              [href]="band.link"
              target="_blank"
              rel="noopener noreferrer"
              referrerpolicy="no-referrer"
              class="btn btn-ghost max-w-fit"
            >
              <svg class="size-[1.2em]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <g
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  stroke-width="2"
                  fill="none"
                  stroke="currentColor"
                >
                  <path d="M6 3L20 12 6 21 6 3z"></path>
                </g>
              </svg>
              Ver ahora
            </a>
          </div>
        </section>
      </section>
    }
  </section>
</article>
